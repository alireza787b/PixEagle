# =============================================================================
# PixEagle Dashboard Configuration
# =============================================================================
# The dashboard HTTP server binds to loopback by default.
# Remote browser access requires a separately secured deployment and explicit
# trusted_lan_legacy launcher configuration until authenticated mode exists.

# API Configuration
# -----------------
# Dashboard HTTP server port (used by npm start and production serve)
PORT: 3040
HOST: 127.0.0.1

# Port where backend API runs
REACT_APP_API_PORT: 5077

# Optional: Override the API host only for a reviewed proxy/tunnel deployment.
# Non-loopback browser origins also require matching backend CORS configuration.
REACT_APP_API_HOST_OVERRIDE: ""

# UI Configuration
# ----------------
REACT_APP_POLLING_RATE: 500
REACT_APP_MAX_SPEED: 1
REACT_APP_DEFAULT_BOUNDING_BOX_SIZE: 0.08
REACT_APP_CONTINUOUS_TARGET_SELECTION: true
