name: Production Remote Browser E2E

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-https-browser-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Validate harness dry run
        run: python tools/run_production_remote_browser_e2e.py --json

      - name: Collect local HTTPS browser evidence
        run: |
          python tools/run_production_remote_browser_e2e.py \
            --execute-browser \
            --allow-local-self-signed-tls \
            --json

      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-remote-browser-evidence
          path: reports/production-remote-browser/*/upload/
          if-no-files-found: warn
          retention-days: 14
