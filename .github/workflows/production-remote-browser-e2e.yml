name: Production Remote Browser E2E

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-https-browser-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Validate harness dry run
        run: python tools/run_production_remote_browser_e2e.py --json

      - name: Collect local HTTPS browser evidence
        run: |
          python tools/run_production_remote_browser_e2e.py \
            --execute-browser \
            --allow-local-self-signed-tls \
            --json

      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-remote-browser-evidence
          path: reports/production-remote-browser/*/upload/
          if-no-files-found: warn
          retention-days: 14
