version: 1
metadata:
  owner: pixeagle-operator
  boundary: pixeagle-process-local
  registry_stage: docs_review_only
  runtime_loaded: false
  mcp_exposed: false
  default_registry_exposure: exclude
  source_candidate_inventory: docs/agent-context/generated/pixeagle-openapi-tool-candidates.yaml
  notes:
  - This registry is a reviewed agent-context artifact only.
  - It is not loaded by a PixEagle runtime MCP endpoint.
  - It does not create MCP tools/list or tools/call exposure.
  - Action, SITL injection, config mutation, model upload, service control, and
    direct PX4/drone-local routes are excluded.
tools:
- id: pixeagle.runtime.status.read
  candidate_id: pixeagle.runtime.status.read
  title: Read PixEagle runtime status
  description: Read the process-local PixEagle runtime mode and subsystem snapshot
    from the typed runtime status route.
  method: GET
  path: /api/v1/runtime/status
  operation_id: get_runtime_status
  response_model: APIRuntimeStatusResponse
  route:
    method: GET
    path: /api/v1/runtime/status
    operation_id: get_runtime_status
  exposure: review_only
  mcp_exposure: none
  callable: false
  default_registry_exposure: exclude
  promotion_status: unpromoted
  risk_class: observe
  candidate_risk_class: process_local_observe
  boundary: pixeagle-process-local
  read_only: true
  required_role: viewer
  runtime_modes:
  - read_only
  - sitl
  - real
  side_effects: []
  sensitivity:
  - runtime_status
  tags:
  - agent-context
  - runtime
  - status
  docs:
  - docs/agent-context/README.md
  - docs/core-app/03-api/README.md
  tests:
  - tests/test_api_tool_candidates.py
  safety_notes:
  - Process-local snapshot only; not PX4-observed Offboard proof.
  - Does not prove SITL, HIL, field, vehicle-response, or real-aircraft behavior.
  - Keep unexposed until runtime MCP auth, policy, tests, and reviewer gates exist.
  input_schema:
    type: object
    additionalProperties: false
    properties: {}
  output_contract:
    response_model: APIRuntimeStatusResponse
    claim_boundary_field: claim_boundary
  output_schema_ref: APIRuntimeStatusResponse
