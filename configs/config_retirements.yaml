registry_version: 1

# Only exact paths listed here may be removed by config migration. Absence from
# config_default.yaml or config_schema.yaml never makes an extension obsolete.
retirements:
  - id: remove-gstreamer-contrast-v1
    path: [GStreamer, GSTREAMER_CONTRAST]
    action: remove
    retired_in_schema_version: 1.1.0
    reason: Output-specific OSD and encoder pipelines replaced the unused global image adjustment.
    replacement: null

  - id: remove-gstreamer-brightness-v1
    path: [GStreamer, GSTREAMER_BRIGHTNESS]
    action: remove
    retired_in_schema_version: 1.1.0
    reason: Output-specific OSD and encoder pipelines replaced the unused global image adjustment.
    replacement: null

