schema_version: 1.5.0
meta:
  project: PixEagle
  generated_from: configs/config_default.yaml
  generated_at: null
  description: Auto-generated schema for PixEagle configuration
  extension_sections: {}
categories:
  video:
    display_name: Video Input
    icon: videocam
    order: 1
  network:
    display_name: Network & Streaming
    icon: router
    order: 2
  tracking:
    display_name: Tracking
    icon: gps_fixed
    order: 3
  detection:
    display_name: Detection
    icon: search
    order: 4
  follower:
    display_name: Followers
    icon: navigation
    order: 5
  safety:
    display_name: Safety
    icon: shield
    order: 6
  control:
    display_name: Control
    icon: tune
    order: 7
  processing:
    display_name: Processing
    icon: auto_fix_high
    order: 8
  display:
    display_name: Display & Debug
    icon: tv
    order: 9
sections:
  VideoSource:
    display_name: Video Source
    category: video
    icon: videocam
    parameters:
      VIDEO_SOURCE_TYPE:
        type: string
        default: VIDEO_FILE
        description: Primary video input source type
        reload_tier: system_restart
        reboot_required: true
        options:
        - value: VIDEO_FILE
          label: Video file
          description: Read frames from a local video file
        - value: USB_CAMERA
          label: USB camera
          description: Read frames from a local USB/V4L camera
        - value: RTSP_OPENCV
          label: RTSP via OpenCV
          description: Open an RTSP stream through OpenCV capture
        - value: RTSP_STREAM
          label: RTSP stream
          description: Open an RTSP stream with the configured stream backend
        - value: UDP_STREAM
          label: UDP stream
          description: Read a configured UDP video stream
        - value: HTTP_STREAM
          label: HTTP stream
          description: Read a configured HTTP video stream
        - value: CSI_CAMERA
          label: CSI camera
          description: Read frames from a Raspberry Pi or Jetson CSI camera
        - value: CUSTOM_GSTREAMER
          label: Custom GStreamer
          description: Use the advanced custom GStreamer input pipeline
      CAPTURE_WIDTH:
        type: integer
        default: 640
        description: Width in pixels (lower = less CPU)
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 10000
        unit: px
      CAPTURE_HEIGHT:
        type: integer
        default: 480
        description: Height in pixels
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 10000
        unit: px
      CAPTURE_FPS:
        type: integer
        default: 30
        description: Target FPS (actual may vary by source)
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 1000
        unit: fps
      DEFAULT_FPS:
        type: integer
        default: 30
        description: Fallback if source doesn't report FPS
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 1000
        unit: fps
      PIPELINE_MODE:
        type: string
        default: REALTIME
        description: PIPELINE_MODE parameter
        reload_tier: system_restart
        reboot_required: true
        options:
        - value: REALTIME
          label: REALTIME
        - value: MAX_THROUGHPUT
          label: MAX_THROUGHPUT
        - value: DETERMINISTIC_REPLAY
          label: DETERMINISTIC_REPLAY
      USE_GSTREAMER:
        type: boolean
        default: false
        description: === Source-Specific Parameters ===
        reload_tier: system_restart
        reboot_required: true
      VIDEO_FILE_PATH:
        type: string
        default: resources/test4.mp4
        description: Path to the local video replay file
        reload_tier: system_restart
        reboot_required: true
      VIDEO_FILE_EOF_POLICY:
        type: string
        default: LOOP
        description: End-of-file behavior for VIDEO_FILE; replay media is never command-fresh for autonomous following
        reload_tier: system_restart
        reboot_required: true
        options:
        - value: LOOP
          label: Loop
          description: Rewind at EOF with an explicit unusable boundary frame
        - value: STOP
          label: Stop
          description: Hold the final cached frame without reconnect attempts
      CAMERA_INDEX:
        type: integer
        default: 0
        description: 0=first camera, 1=second, etc.
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 10000
      RTSP_URL:
        type: string
        default: rtsp://192.168.0.108:554/stream=0
        description: RTSP Protocol Settings
        reload_tier: system_restart
        reboot_required: true
      RTSP_PROTOCOL:
        type: string
        default: tcp
        description: 'RTSP_LATENCY: Buffer time in milliseconds'
        reload_tier: system_restart
        reboot_required: true
      RTSP_LATENCY:
        type: integer
        default: 200
        description: === Connection Recovery Settings ===
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 10000
      RTSP_MAX_CONSECUTIVE_FAILURES:
        type: integer
        default: 10
        description: Failed frame reads before recovery attempt
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 200
      RTSP_CONNECTION_TIMEOUT:
        type: float
        default: 5.0
        description: Seconds without a good frame before recovery
        reload_tier: system_restart
        reboot_required: true
        min: 0.0
        max: 100.0
        step: 0.1
        unit: s
      RTSP_MAX_RECOVERY_ATTEMPTS:
        type: integer
        default: 3
        description: Reconnect attempts per failure event
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 100
      RTSP_FRAME_CACHE_SIZE:
        type: integer
        default: 5
        description: Cached good frames for graceful degradation
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 100
      RTSP_RECOVERY_BACKOFF_BASE:
        type: float
        default: 1.0
        description: Exponential backoff base interval for RTSP reconnect (seconds)
        reload_tier: system_restart
        reboot_required: true
        min: 0.0
        max: 30.0
        step: 0.01
        unit: s
      RTSP_RECOVERY_BACKOFF_MAX:
        type: float
        default: 10.0
        description: Maximum retry delay cap (seconds)
        reload_tier: system_restart
        reboot_required: true
        min: 0.0
        max: 100.0
        step: 0.1
        unit: s
      UDP_URL:
        type: string
        default: udp://172.21.144.1:5000
        description: UDP_URL parameter
        reload_tier: system_restart
        reboot_required: true
      HTTP_URL:
        type: string
        default: http://172.21.144.1:8100
        description: CSI Camera (Raspberry Pi/Jetson camera)
        reload_tier: system_restart
        reboot_required: true
      CSI_SENSOR_ID:
        type: integer
        default: 0
        description: Usually 0 for first CSI port
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 10000
      FRAME_ROTATION_DEG:
        type: integer
        default: 0
        description: Frame rotation angle (must match cv2.rotate preset)
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 270
        options:
        - value: 0
          label: 0°
        - value: 90
          label: 90°
        - value: 180
          label: 180°
        - value: 270
          label: 270°
        unit: deg
      FRAME_FLIP_MODE:
        type: string
        default: none
        description: Frame flip mode applied after rotation
        reload_tier: system_restart
        reboot_required: true
        options:
        - value: none
          label: None
        - value: horizontal
          label: Horizontal
        - value: vertical
          label: Vertical
        - value: both
          label: Both
      CUSTOM_PIPELINE:
        type: string
        default: ''
        description: === Legacy Parameters (kept for compatibility) ===
        reload_tier: system_restart
        reboot_required: true
      STORE_LAST_FRAMES:
        type: integer
        default: 5
        description: Frame history buffer size
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 100
    additional_properties: false
  USBCamera:
    display_name: USB Camera
    category: video
    icon: usb
    parameters:
      DEVICE_PATH:
        type: string
        default: /dev/video0
        description: Pixel format selection (impacts CPU usage)
        reload_tier: system_restart
        reboot_required: true
      PIXEL_FORMAT:
        type: string
        default: YUYV
        description: OpenCV backend optimizations (when USE_GSTREAMER=false)
        reload_tier: system_restart
        reboot_required: true
      USE_V4L2_BACKEND:
        type: boolean
        default: false
        description: 'Linux only: direct V4L2 access'
        reload_tier: system_restart
        reboot_required: true
      OPENCV_BUFFER_SIZE:
        type: integer
        default: 1
        description: 1=lowest latency, 3=smoother
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 10000
      OPENCV_FOURCC:
        type: string
        default: ''
        description: 'Force codec: "MJPG", "H264", etc.'
        reload_tier: system_restart
        reboot_required: true
    additional_properties: false
  CSICamera:
    display_name: CSI Camera
    category: video
    icon: camera
    parameters:
      SENSOR_ID:
        type: integer
        default: 0
        description: Camera sensor ID
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 10000
    additional_properties: false
  PX4:
    display_name: PX4 Connection
    category: network
    icon: flight
    parameters:
      EXTERNAL_MAVSDK_SERVER:
        type: boolean
        default: true
        description: Use a gRPC mavsdk_server process instead of the Python client spawning an embedded child process
        reload_tier: system_restart
        reboot_required: true
      MAVSDK_SERVER_ADDRESS:
        type: string
        default: 127.0.0.1
        description: Host or IP address of the external MAVSDK gRPC server
        reload_tier: system_restart
        reboot_required: true
      MAVSDK_SERVER_PORT:
        type: integer
        default: 50051
        description: TCP port of the external MAVSDK gRPC server
        reload_tier: system_restart
        reboot_required: true
        min: 1
        max: 65535
      SYSTEM_ADDRESS:
        type: string
        default: udpin://127.0.0.1:14540
        description: Vehicle link URI used by an embedded server or passed to the PixEagle-managed external mavsdk_server
          process
        reload_tier: system_restart
        reboot_required: true
      MAVSDK_CONNECTION_TIMEOUT_S:
        type: float
        default: 15.0
        description: Deadline for MAVSDK to discover a connected PX4 vehicle after opening the configured link
        reload_tier: system_restart
        reboot_required: true
        min: 0.1
        max: 120.0
        step: 0.5
        unit: s
      MAVSDK_COMMAND_TIMEOUT_S:
        type: float
        default: 3.0
        description: Deadline for one MAVSDK setpoint, Offboard, or action command RPC
        reload_tier: system_restart
        reboot_required: true
        min: 0.05
        max: 30.0
        step: 0.05
        unit: s
    additional_properties: false
  MAVLink:
    display_name: MAVLink Telemetry
    category: network
    icon: router
    parameters:
      MAVLINK_ENABLED:
        type: boolean
        default: true
        description: 'For local: 127.0.0.1'
        reload_tier: system_restart
        reboot_required: true
      MAVLINK_HOST:
        type: string
        default: 127.0.0.1
        description: MAVLINK_HOST parameter
        reload_tier: system_restart
        reboot_required: true
      MAVLINK_PORT:
        type: integer
        default: 8088
        description: MAVLINK_PORT parameter
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 1000000
      MAVLINK_POLLING_INTERVAL:
        type: float
        default: 0.5
        description: MavlinkDataManager polling interval for the MAVLink2REST aggregate endpoint
        reload_tier: system_restart
        reboot_required: true
        min: 0.1
        max: 10.0
        step: 0.1
        unit: s
      MAVLINK_REQUEST_TIMEOUT_S:
        type: float
        default: 5.0
        description: HTTP timeout for each MAVLink2REST request before telemetry is marked degraded
        reload_tier: system_restart
        reboot_required: true
        min: 0.1
        max: 30.0
        step: 0.1
        unit: s
      MAVLINK_REQUEST_RETRIES:
        type: integer
        default: 0
        description: Additional retry attempts after the initial MAVLink2REST request fails
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 5
      MAVLINK_STALE_TIMEOUT_S:
        type: float
        default: 2.0
        description: Maximum age since the last successful MAVLink2REST request before telemetry is reported stale
        reload_tier: system_restart
        reboot_required: true
        min: 0.1
        max: 5.0
        step: 0.1
        unit: s
      MAVLINK_DATA_POINTS:
        type: object
        default:
          latitude: /vehicles/1/components/1/messages/GLOBAL_POSITION_INT/message/lat
          longitude: /vehicles/1/components/1/messages/GLOBAL_POSITION_INT/message/lon
          altitude_msl: /vehicles/1/components/1/messages/ALTITUDE/message/altitude_amsl
          altitude_agl: /vehicles/1/components/1/messages/ALTITUDE/message/altitude_relative
          voltage: /vehicles/1/components/1/messages/SYS_STATUS/message/voltage_battery
          airspeed: /vehicles/1/components/1/messages/VFR_HUD/message/airspeed
          throttle: /vehicles/1/components/1/messages/VFR_HUD/message/throttle
          groundspeed: /vehicles/1/components/1/messages/VFR_HUD/message/groundspeed
          climb: /vehicles/1/components/1/messages/VFR_HUD/message/climb
          vn: /vehicles/1/components/1/messages/LOCAL_POSITION_NED/message/vx
          ve: /vehicles/1/components/1/messages/LOCAL_POSITION_NED/message/vy
          vd: /vehicles/1/components/1/messages/LOCAL_POSITION_NED/message/vz
          flight_path_angle: null
          roll: /vehicles/1/components/1/messages/ATTITUDE/message/roll
          pitch: /vehicles/1/components/1/messages/ATTITUDE/message/pitch
          heading: /vehicles/1/components/1/messages/VFR_HUD/message/heading
          vdop: /vehicles/1/components/1/messages/GPS_RAW_INT/message/vdop
          hdop: /vehicles/1/components/1/messages/GPS_RAW_INT/message/hdop
          satellites_visible: /vehicles/1/components/1/messages/GPS_RAW_INT/message/satellites_visible
          flight_mode: /vehicles/1/components/1/messages/HEARTBEAT/message/custom_mode
          arm_status: /vehicles/1/components/1/messages/HEARTBEAT/message/base_mode
        description: MAVLINK_DATA_POINTS parameter
        reload_tier: system_restart
        reboot_required: true
        properties:
          latitude:
            type: string
            default: /vehicles/1/components/1/messages/GLOBAL_POSITION_INT/message/lat
            description: latitude parameter
            reload_tier: system_restart
            reboot_required: true
          longitude:
            type: string
            default: /vehicles/1/components/1/messages/GLOBAL_POSITION_INT/message/lon
            description: longitude parameter
            reload_tier: system_restart
            reboot_required: true
          altitude_msl:
            type: string
            default: /vehicles/1/components/1/messages/ALTITUDE/message/altitude_amsl
            description: altitude_msl parameter
            reload_tier: system_restart
            reboot_required: true
          altitude_agl:
            type: string
            default: /vehicles/1/components/1/messages/ALTITUDE/message/altitude_relative
            description: altitude_agl parameter
            reload_tier: system_restart
            reboot_required: true
          voltage:
            type: string
            default: /vehicles/1/components/1/messages/SYS_STATUS/message/voltage_battery
            description: voltage parameter
            reload_tier: system_restart
            reboot_required: true
          airspeed:
            type: string
            default: /vehicles/1/components/1/messages/VFR_HUD/message/airspeed
            description: airspeed parameter
            reload_tier: system_restart
            reboot_required: true
          throttle:
            type: string
            default: /vehicles/1/components/1/messages/VFR_HUD/message/throttle
            description: throttle parameter
            reload_tier: system_restart
            reboot_required: true
          groundspeed:
            type: string
            default: /vehicles/1/components/1/messages/VFR_HUD/message/groundspeed
            description: groundspeed parameter
            reload_tier: system_restart
            reboot_required: true
          climb:
            type: string
            default: /vehicles/1/components/1/messages/VFR_HUD/message/climb
            description: climb parameter
            reload_tier: system_restart
            reboot_required: true
          vn:
            type: string
            default: /vehicles/1/components/1/messages/LOCAL_POSITION_NED/message/vx
            description: vn parameter
            reload_tier: system_restart
            reboot_required: true
          ve:
            type: string
            default: /vehicles/1/components/1/messages/LOCAL_POSITION_NED/message/vy
            description: ve parameter
            reload_tier: system_restart
            reboot_required: true
          vd:
            type: string
            default: /vehicles/1/components/1/messages/LOCAL_POSITION_NED/message/vz
            description: vd parameter
            reload_tier: system_restart
            reboot_required: true
          flight_path_angle:
            type: string
            default: null
            description: flight_path_angle parameter
            reload_tier: system_restart
            reboot_required: true
            nullable: true
          roll:
            type: string
            default: /vehicles/1/components/1/messages/ATTITUDE/message/roll
            description: roll parameter
            reload_tier: system_restart
            reboot_required: true
          pitch:
            type: string
            default: /vehicles/1/components/1/messages/ATTITUDE/message/pitch
            description: pitch parameter
            reload_tier: system_restart
            reboot_required: true
          heading:
            type: string
            default: /vehicles/1/components/1/messages/VFR_HUD/message/heading
            description: heading parameter
            reload_tier: system_restart
            reboot_required: true
          vdop:
            type: string
            default: /vehicles/1/components/1/messages/GPS_RAW_INT/message/vdop
            description: vdop parameter
            reload_tier: system_restart
            reboot_required: true
          hdop:
            type: string
            default: /vehicles/1/components/1/messages/GPS_RAW_INT/message/hdop
            description: hdop parameter
            reload_tier: system_restart
            reboot_required: true
          satellites_visible:
            type: string
            default: /vehicles/1/components/1/messages/GPS_RAW_INT/message/satellites_visible
            description: satellites_visible parameter
            reload_tier: system_restart
            reboot_required: true
          flight_mode:
            type: string
            default: /vehicles/1/components/1/messages/HEARTBEAT/message/custom_mode
            description: flight_mode parameter
            reload_tier: system_restart
            reboot_required: true
          arm_status:
            type: string
            default: /vehicles/1/components/1/messages/HEARTBEAT/message/base_mode
            description: ==============================================================================
            reload_tier: system_restart
            reboot_required: true
        required:
        - latitude
        - longitude
        - altitude_msl
        - altitude_agl
        - voltage
        - airspeed
        - throttle
        - groundspeed
        - climb
        - vn
        - ve
        - vd
        - flight_path_angle
        - roll
        - pitch
        - heading
        - vdop
        - hdop
        - satellites_visible
        - flight_mode
        - arm_status
        additional_properties: false
    additional_properties: false
  Streaming:
    display_name: Video Streaming
    category: network
    icon: stream
    parameters:
      ENABLE_STREAMING:
        type: boolean
        default: true
        description: === Server Settings ===
        reload_tier: system_restart
        reboot_required: true
      API_EXPOSURE_MODE:
        type: string
        default: local_only
        description: API exposure boundary; wildcard origins are prohibited in every mode
        reload_tier: system_restart
        reboot_required: true
        options:
        - value: local_only
          label: Local only
          description: Require an explicit loopback bind and loopback CORS origins
        - value: trusted_lan_legacy
          label: Trusted LAN (legacy)
          description: Temporary LAN compatibility; use bearer tokens for machine clients or explicit browser_session auth
            for browser clients
      HTTP_STREAM_HOST:
        type: string
        default: 127.0.0.1
        description: Backend bind host; local_only requires 127.0.0.1, ::1, or localhost
        reload_tier: system_restart
        reboot_required: true
      HTTP_STREAM_PORT:
        type: integer
        default: 5077
        description: Backend API and streaming port
        reload_tier: system_restart
        reboot_required: true
        min: 0
        max: 1000000
      API_CORS_ALLOWED_ORIGINS:
        type: array
        default:
        - http://127.0.0.1:3040
        - http://localhost:3040
        - http://127.0.0.1:5077
        - http://localhost:5077
        description: Explicit browser origins allowed to call the backend; wildcard origins are prohibited
        reload_tier: system_restart
        reboot_required: true
        item_type: string
      API_ALLOWED_HOSTS:
        type: array
        default: []
        description: Exact backend Host authorities for reviewed non-loopback profiles; an optional port supports reverse
          proxies; never use wildcards, URLs, or credentials
        reload_tier: system_restart
        reboot_required: true
      API_AUTH_MODE:
        type: string
        default: local_compat
        description: Runtime API authorization mode
        reload_tier: system_restart
        reboot_required: true
        options:
        - value: local_compat
          label: Local compatibility
          description: Allow same-host loopback socket clients without credentials; non-loopback clients need bearer tokens
        - value: machine_bearer
          label: Machine bearer only
          description: Require scoped bearer tokens for machine API clients
        - value: browser_session
          label: Browser sessions
          description: Require an external hashed user file and use HttpOnly cookies with CSRF for browser/operator API access
      API_SYSTEM_RESTART_POLICY:
        type: string
        default: local_only
        description: Process-start policy for the typed backend restart action; changes require a process restart before taking
          effect
        reload_tier: system_restart
        reboot_required: true
        options:
        - value: local_only
          label: Local only
          description: Allow typed process restart only from a verified loopback transport
        - value: lab_admin_browser
          label: Lab admin browser
          description: Also allow a remote authenticated admin browser session; reserved for the beginner LAN demo profile
      ALLOW_UNAUTHENTICATED_MEDIA_STREAMING:
        type: boolean
        default: false
        description: Unsafe lab-only exception that allows anonymous access only to GET /video_feed and WS /ws/video_feed;
          never enables dashboard, control, config, logs, WebRTC signaling, or media-health APIs
        reload_tier: system_restart
        reboot_required: true
      API_BEARER_TOKEN_FILE:
        type: string
        default: ''
        description: Optional external JSON file containing hashed, named, revocable machine bearer token records
        reload_tier: system_restart
        reboot_required: true
      API_SESSION_USER_FILE:
        type: string
        default: ''
        description: Optional external JSON file containing hashed browser/operator session user records
        reload_tier: system_restart
        reboot_required: true
      API_SESSION_TTL_SECONDS:
        type: integer
        default: 28800
        description: Browser session lifetime in seconds for API_AUTH_MODE=browser_session
        reload_tier: system_restart
        reboot_required: true
        min: 60
        max: 604800
        unit: s
      API_SESSION_COOKIE_NAME:
        type: string
        default: pixeagle_session
        description: HttpOnly browser session cookie name for API_AUTH_MODE=browser_session
        reload_tier: system_restart
        reboot_required: true
      API_SESSION_COOKIE_SECURE:
        type: boolean
        default: false
        description: Require HTTPS for the browser session cookie; enable when serving PixEagle over TLS
        reload_tier: system_restart
        reboot_required: true
      API_CSRF_HEADER_NAME:
        type: string
        default: X-PixEagle-CSRF
        description: Header name carrying the session-bound CSRF token for browser mutations
        reload_tier: system_restart
        reboot_required: true
      API_SECURITY_AUDIT_ENABLED:
        type: boolean
        default: true
        description: Write durable JSONL API security audit events for auth, denial, sensitive read, mutation, and security-critical
          routes
        reload_tier: system_restart
        reboot_required: true
      API_SECURITY_AUDIT_LOG_PATH:
        type: string
        default: logs/security_audit.jsonl
        description: Local append-only JSONL path for sanitized API security audit events; do not store credentials here
        reload_tier: system_restart
        reboot_required: true
      API_SECURITY_AUDIT_MAX_BYTES:
        type: integer
        default: 5000000
        description: Maximum security audit JSONL file size before rotation
        reload_tier: system_restart
        reboot_required: true
        min: 1024
        max: 100000000
        unit: bytes
