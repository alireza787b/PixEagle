# PixEagle Tracker Schema Configuration
# This file defines all available tracker data types and their requirements
# Allows easy addition of new tracker schemas without code changes
#
# Note on coordinate ranges:
# - Normalized coordinates can exceed [0.0, 1.0] when objects are partially off-screen
# - Range [-2.0, 2.0] allows for complete off-screen tracking while preventing extreme outliers

tracker_data_types:
  POSITION_2D:
    name: "2D Position Tracking"
    description: "Standard 2D normalized position tracking"
    category: "position"
    required_fields:
      - position_2d
    optional_fields:
      - confidence
      - bbox
      - normalized_bbox
      - velocity
    validation:
      position_2d:
        type: "tuple"
        length: 2
        element_type: "float"
        range: [-2.0, 2.0]  # Allow off-screen tracking
  
  POSITION_3D:
    name: "3D Position with Depth"
    description: "3D position tracking with depth information (includes 2D projection)"
    category: "position"
    required_fields:
      - position_3d
      - position_2d  # 2D projection is mandatory for compatibility
    optional_fields:
      - confidence
      - bbox
      - normalized_bbox
      - velocity
    validation:
      position_3d:
        type: "tuple"
        length: 3
        element_type: "float"
        range: [-2.0, 2.0]  # x,y normalized, z can be > 1
      position_2d:
        type: "tuple"
        length: 2
        element_type: "float"
        range: [-2.0, 2.0]  # Must match x,y components of position_3d
        
  ANGULAR:
    name: "Angular Bearing/Elevation"
    description: "Bearing and elevation angles in degrees"
    category: "angular"
    required_fields:
      - angular
    optional_fields:
      - confidence
      - velocity
    validation:
      angular:
        type: "tuple"
        length: 2
        element_type: "float"
        range: [-180.0, 180.0]

  GIMBAL_ANGLES:
    name: "Gimbal Angle Tracking"
    description: "Real-time gimbal yaw, pitch, roll angles from external gimbal system"
    category: "angular"
    always_reporting: true  # Always provides data when available, no manual start needed
    is_gimbal_tracker: true  # Special gimbal tracker identifier for UI
    required_fields:
      - angular
    optional_fields:
      - position_2d
      - confidence
      - gimbal_metadata
    validation:
      angular:
        type: "tuple"
        length: 3  # yaw, pitch, roll
        element_type: "float"
        range: [-180.0, 180.0]
        description: "Gimbal angles (yaw, pitch, roll) in degrees"
      position_2d:
        type: "tuple"
        length: 2
        element_type: "float"
        range: [-2.0, 2.0]
        description: "Projected target position from gimbal angles"
      gimbal_metadata:
        type: "dict"
        optional_keys:
          - coordinate_system
          - connection_status
          - target_vector_body
          - aircraft_attitude
          - mount_configuration
    # Mount configuration support for coordinate transformations
    mount_configurations:
      HORIZONTAL:
        name: "Horizontal Mount"
        description: "Gimbal mounted horizontally, 1:1 mapping with aircraft body frame"
        coordinate_mapping:
          yaw: "yaw"      # Direct mapping to aircraft yaw
          pitch: "pitch"  # Direct mapping to aircraft pitch
          roll: "roll"    # Direct mapping to aircraft roll
        startup_angles:
          yaw: 0.0       # Forward facing at startup
          pitch: 0.0     # Level at startup
          roll: 0.0      # No roll at startup
        transformation_type: "DIRECT"
        notes: "Direct 1:1 mapping to aircraft body frame coordinates"
      VERTICAL:
        name: "Vertical Mount (90° Rotated)"
        description: "Gimbal mounted vertically, requires 90° rotation transformation"
        coordinate_mapping:
          yaw: "roll"     # Gimbal yaw -> aircraft roll (azimuth)
          pitch: "pitch-90"  # Gimbal pitch-90° -> aircraft pitch (elevation)
          roll: "yaw"     # Gimbal roll -> aircraft yaw (typically unused in active tracking)
        startup_angles:
          yaw: 0.0       # Points forward when rolled to 0°
          pitch: 90.0    # Points down when pitched to 90°
          roll: 0.0      # No additional rotation
        transformation_type: "ROTATIONAL_90"
        notes: "Requires 90° coordinate rotation: roll->azimuth, pitch-90°->elevation"
    # Default mount configuration metadata
    default_mount: "VERTICAL"  # Default to vertical for easier testing
    coordinate_systems:
      source: "GIMBAL_BODY"    # Gimbal's local body frame
      intermediate: "AIRCRAFT_BODY"  # Aircraft body frame (FRD)
      target: "NED"            # North-East-Down world frame
        
  BBOX_CONFIDENCE:
    name: "Bounding Box with Confidence"
    description: "Traditional bounding box tracking with confidence"
    category: "bbox"
    required_fields:
      - bbox_or_normalized_bbox  # Special requirement - at least one must exist
    optional_fields:
      - confidence
      - position_2d
      - velocity
      - geometry_type
      - oriented_bbox
      - polygon
      - normalized_polygon
    validation:
      bbox:
        type: "tuple"
        length: 4
        element_type: "int"
        min_value: 0
      normalized_bbox:
        type: "tuple"
        length: 4
        element_type: "float"
        range: [-2.0, 2.0]  # Allow objects partially or completely off-screen
        
  VELOCITY_AWARE:
    name: "Position with Velocity Estimation"
    description: "Position tracking with velocity estimates"
    category: "motion"
    required_fields:
      - position_2d
      - velocity
    optional_fields:
      - confidence
      - acceleration
      - bbox
      - normalized_bbox
    validation:
      position_2d:
        type: "tuple"
        length: 2
        element_type: "float"
        range: [-2.0, 2.0]  # Allow off-screen tracking
      velocity:
        type: "tuple"
        length: 2
        element_type: "float"
        
  EXTERNAL:
    name: "External Data Source"
    description: "Data from external sources (radar, GPS, etc.)"
    category: "external"
    required_fields:
      - raw_data  # Must contain source-specific data
    optional_fields:
      - position_2d
      - position_3d
      - angular
      - confidence
      - metadata
    validation:
      raw_data:
        type: "dict"
        required_keys:
          - source_type
          - source_data
          
  MULTI_TARGET:
    name: "Multiple Target Tracking"
    description: "Tracking multiple targets simultaneously"
    category: "multi"
    required_fields:
      - targets
    optional_fields:
      - target_id  # ID of selected/primary target
      - position_2d  # Primary target position
      - confidence
      - bbox
      - normalized_bbox
      - geometry_type
      - oriented_bbox
      - polygon
      - normalized_polygon
    validation:
      targets:
        type: "list"
        min_length: 1
        element_schema:
          type: "dict"
          required_keys:
            - target_id
            - confidence
          optional_keys:
            - class_id
            - class_name
            - bbox
            - center
            - is_selected
            - geometry_type
            - oriented_bbox
            - polygon
            - normalized_polygon

# Tracker type configurations
tracker_types:
  CSRTTracker:
    name: "CSRT Tracker"
    description: "OpenCV short-term correlation tracker with PixEagle candidate validation"
    supported_schemas:
      - POSITION_2D
      - BBOX_CONFIDENCE
      - VELOCITY_AWARE  # When estimator is enabled
    capabilities:
      - correlation_filter
      - scale_adaptation
      - appearance_validation
      - tentative_candidate_validation
    performance:
      evidence_required: true
      note: "Measure latency, drift, and identity continuity on the intended camera, scene, cadence, and computer"
    # UI Configuration for dashboard tracker selector
    ui_metadata:
      display_name: "CSRT"
      short_description: "Validated short-term correlation tracking"
      icon: "🎯"
      factory_key: "CSRT"  # Key used in tracker_factory.py create_tracker()
      exclude_from_ui: false  # Show in UI selector
      performance_category: "scenario_dependent"
      suitable_for:
        - "Textured single targets"
        - "Scale-adaptive short-term tracking"
        - "Recorded-scene baselines"
      recommended_scenarios:
        - "Single-target tracking with bounded detector recovery"
        - "Representative-scene tracker comparison"

  KCFKalmanTracker:
    name: "KCF + Kalman Filter Tracker"
    description: "OpenCV short-term KCF tracker with diagnostic Kalman motion estimation"
    supported_schemas:
      - BBOX_CONFIDENCE
      - POSITION_2D
      - VELOCITY_AWARE  # Via internal Kalman filter
    capabilities:
      - fast_correlation_filter
      - internal_kalman_filter
      - velocity_estimation
      - bbox_stability_confidence
    performance:
      evidence_required: true
      note: "Benchmark cost, drift, and identity continuity on the target hardware; prediction is diagnostic only"
    # UI Configuration for dashboard tracker selector
    ui_metadata:
      display_name: "KCF + Kalman"
      short_description: "Fast tracking with state estimation"
      icon: "⚡"
      factory_key: "KCF"  # Key used in tracker_factory.py create_tracker()
      exclude_from_ui: false  # Show in UI selector
      performance_category: "scenario_dependent"
      suitable_for:
        - "Lower-cost short-term tracking"
        - "Diagnostic velocity estimation"
        - "Target-hardware benchmarks"
      recommended_scenarios:
        - "Single-target tracker comparison"
        - "Bounded recovery search with motion hints"
      
  SmartTracker:
    name: "YOLO-based Smart Tracker"
    description: "YOLO detect/OBB inference with ByteTrack, BoT-SORT, or optional PixEagle appearance matching"
    supported_schemas:
      - MULTI_TARGET
      - POSITION_2D  # For selected target
      - BBOX_CONFIDENCE
    capabilities:
      - multi_target
      - object_classification
      - real_time_detection
    performance:
      evidence_required: true
      note: "Measure the configured model, tracker mode, input, and hardware"
      bounded_readiness_claim: "Verified local artifact load plus one deterministic detection inference"
      tracking_readiness: "Requires a separate retained tracking scenario test"
    # UI Configuration for dashboard tracker selector
    ui_metadata:
      display_name: "Smart Tracker (YOLO)"
      short_description: "AI-powered multi-target tracking"
      icon: "🤖"
      factory_key: null  # Not created via factory; activated by Smart Mode
      exclude_from_ui: true  # Excluded - controlled via Smart Mode toggle
      performance_category: "ai_powered"
      note: "Controlled via Smart Mode toggle button, not tracker selector"

  GimbalTracker:
    name: "Gimbal Angle Tracker"
    description: "Real-time gimbal angle tracking via UDP protocol"
    supported_schemas:
      - GIMBAL_ANGLES
      - ANGULAR  # Backward compatibility
      - POSITION_2D  # Derived from angle conversion
    capabilities:
      - external_data_source
      - real_time_updates
      - coordinate_transformation
      - suppressed_image_processing
    performance:
      evidence_required: true
      note: "Accuracy, cadence, and latency depend on the configured provider, transport, mount transform, and hardware"
    # UI Configuration for dashboard tracker selector
    ui_metadata:
      display_name: "Gimbal Tracker"
      short_description: "External gimbal angle tracker"
      icon: "📡"
      factory_key: "Gimbal"  # Key used in tracker_factory.py create_tracker()
      exclude_from_ui: false  # Show in UI selector for gimbal users
      performance_category: "provider_dependent"
      suitable_for:
        - "External gimbal system integration"
        - "Real-time UDP angle data"
        - "No image processing overhead"
        - "Provider-normalized external observations"
      recommended_scenarios:
        - "Integration with external gimbal hardware"
        - "Camera gimbal angle-based tracking"
        - "Systems with dedicated gimbal control"

  DlibTracker:
    name: "dlib Correlation Tracker"
    description: "Optional short-term correlation tracker with PSR confidence scoring"
    supported_schemas:
      - POSITION_2D
      - BBOX_CONFIDENCE
      - VELOCITY_AWARE  # When estimator is enabled
    capabilities:
      - fast_correlation_filter
      - psr_confidence_scoring
      - scale_adaptation
      - appearance_learning
      - performance_modes  # fast, balanced, robust
    performance:
      evidence_required: true
      note: "Measure optional-backend latency, PSR behavior, drift, and continuity on the target hardware"
    notes:
      - "Uses PSR (Peak-to-Sidelobe Ratio) for confidence scoring"
      - "Mode names select validation cost; they are not FPS or readiness guarantees"
      - "No identity or occlusion-recovery guarantee is implied"
    # UI Configuration for dashboard tracker selector
    ui_metadata:
      display_name: "dlib Correlation"
      short_description: "Optional PSR-based correlation tracker"
      icon: "🚀"
      factory_key: "dlib"  # Key used in tracker_factory.py create_tracker()
      exclude_from_ui: false  # Show in UI selector
      performance_category: "scenario_dependent"
      suitable_for:
        - "PSR-based confidence experiments"
        - "Short-term single-target tracking"
        - "Target-hardware benchmarks"
      recommended_scenarios:
        - "Comparison with CSRT and KCF"
        - "Optional-backend evaluation"

# Schema compatibility matrix
compatibility:
  followers:
    MCAttitudeRateFollower:
      required_schemas:
        - POSITION_2D
      compatible_schemas:
        - POSITION_3D  # Works because 3D includes 2D projection
        - BBOX_CONFIDENCE
        - VELOCITY_AWARE
        - MULTI_TARGET  # SmartTracker provides position_2d for selected target
    MCVelocityChaseFollower:
      required_schemas:
        - POSITION_2D
      compatible_schemas:
        - POSITION_3D  # Works because 3D includes 2D projection
        - MULTI_TARGET  # SmartTracker provides position_2d for selected target
      preferred_schemas:
        - VELOCITY_AWARE
      optional_schemas:
        - BBOX_CONFIDENCE
    MCVelocityPositionFollower:
      required_schemas:
        - POSITION_2D
      compatible_schemas:
        - POSITION_3D  # Works because 3D includes 2D projection
        - VELOCITY_AWARE  # Works because VELOCITY_AWARE includes position_2d
        - MULTI_TARGET  # SmartTracker provides position_2d for selected target
      optional_schemas:
        - ANGULAR
        - BBOX_CONFIDENCE
    MCVelocityDistanceFollower:
      required_schemas:
        - POSITION_2D
      compatible_schemas:
        - POSITION_3D  # Uses only the included 2D projection
        - VELOCITY_AWARE  # Works because VELOCITY_AWARE includes position_2d
        - MULTI_TARGET  # SmartTracker provides position_2d for selected target
      optional_schemas:
        - BBOX_CONFIDENCE
        - ANGULAR
    MCVelocityGroundFollower:
      required_schemas:
        - POSITION_2D
      compatible_schemas:
        - POSITION_3D  # Works because 3D includes 2D projection
        - VELOCITY_AWARE  # Works because VELOCITY_AWARE includes position_2d
        - MULTI_TARGET  # SmartTracker provides position_2d for selected target
      preferred_schemas:
        - ANGULAR
        - POSITION_3D  # 3D helps with ground projection
      optional_schemas:
        - EXTERNAL
    GMVelocityChaseFollower:
      required_schemas:
        - GIMBAL_ANGLES
      preferred_schemas:
        - GIMBAL_ANGLES
    GMVelocityVectorFollower:
      required_schemas:
        - GIMBAL_ANGLES
      preferred_schemas:
        - GIMBAL_ANGLES
    FWAttitudeRateFollower:
      required_schemas:
        - POSITION_2D
      compatible_schemas:
        - POSITION_3D  # Works because 3D includes 2D projection
        - VELOCITY_AWARE  # Enhances L1 navigation
        - MULTI_TARGET  # SmartTracker provides position_2d for selected target
      preferred_schemas:
        - VELOCITY_AWARE  # Prefers velocity data for better path following
        - POSITION_3D  # 3D path following with L1/TECS guidance
      optional_schemas:
        - BBOX_CONFIDENCE  # Confidence data for adaptive behavior

# Future extensibility guidelines
extensibility:
  adding_new_schema:
    steps:
      - "Define schema in this YAML file"
      - "Add validation rules"
      - "Update tracker implementations as needed"
      - "Test compatibility with existing followers"
  adding_new_tracker:
    steps:
      - "Implement BaseTracker interface"
      - "Define supported schemas in this file"
      - "Add to tracker factory"
      - "Test with all compatible followers"
  schema_versioning:
    current_version: "1.0"
    backward_compatibility: true
    migration_support: true
